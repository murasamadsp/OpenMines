[package]
name = "openmines-server"
description = "OpenMines — игровой сервер (Rust) и legacy Unity-клиент"
version = "0.0.2"
edition = "2024"
homepage = "https://github.com/murasama/OpenMines"
repository = "https://github.com/murasama/OpenMines"
authors = ["OpenMines contributors"]
keywords = ["game", "server", "rust", "tcp", "sqlite"]
license = "MIT"

[[bin]]
name = "openmines-server"
path = "server/main.rs"

[dependencies]
tokio = { version = "1.52.3", features = ["full"] }
bytes = "1.12.0"
memmap2 = "0.9.10"
rusqlite = { version = "0.32.1", features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
md5 = "0.7.0"
sha2 = "0.10.9"
rand = "0.9.4"
dashmap = "6.2.1"
parking_lot = "0.12.5"
rayon = "1.12.0"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
tracing-appender = "0.2.5"
anyhow = "1.0.102"
prometheus = "0.14.0"
bevy_ecs = "0.18.1"
base64 = "0.22.1"
lzma-rs = "0.3.0"


[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
