[package]
name = "openmines-server"
description = "OpenMines — игровой сервер (Rust) и legacy Unity-клиент"
version = "0.0.2"
edition = "2024"
homepage = "https://github.com/murasama/OpenMines"
repository = "https://github.com/murasama/OpenMines"
authors = ["OpenMines contributors"]
keywords = ["game", "server", "rust", "tcp", "sqlite"]
license = "MIT"

[[bin]]
name = "openmines-server"
path = "server/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
bytes = "1"
memmap2 = "0.9"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
rand = "0.9.3"
dashmap = "6"
parking_lot = "0.12"
rayon = "1.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
anyhow = "1"
axum = "0.7"
tower-http = { version = "0.5", features = ["cors"] }
prometheus = "0.13"
once_cell = "1"
bevy_ecs = "0.18.1"

# crates.io noise 0.9.0 still pulls rand 0.8 (audit path); `develop` has rand 0.9; pin rev — см. https://github.com/Razaekel/noise-rs
[patch.crates-io]
noise = { git = "https://github.com/Razaekel/noise-rs", rev = "77de33887620c2a7e7263b1d30ef46afbfe705b6" }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
