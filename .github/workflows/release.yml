name: релиз

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег релиза (например, v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Сборка и публикация релиза
    runs-on: ubuntu-latest
    steps:
      - name: Загрузка репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Подготовка метаданных релиза
        id: vars
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="$GITHUB_REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER}/openmines-server" >> "$GITHUB_OUTPUT"

      - name: Установка rust toolchain
        uses: rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0

      - uses: Swatinem/rust-cache@v2

      - name: Сборка бинарника сервера
        run: cargo build --locked --release

      - name: Подготовка артефактов релиза
        run: |
          mkdir -p release-artifacts
          cp target/release/openmines-server release-artifacts/openmines-server-linux-x86_64
          cp config.json release-artifacts/config.json
          cp cells.json release-artifacts/cells.json
          sha256sum release-artifacts/openmines-server-linux-x86_64 > release-artifacts/openmines-server-linux-x86_64.sha256

      - name: Вход в GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Подготовка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка и публикация Docker image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image_name }}:latest
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}

      - name: Подготовка текста релиза
        run: |
          cat > release-notes.md <<EOF
          ## Релиз ${{ steps.vars.outputs.tag }}
          
          - Docker image: `${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}`
          - Digest: `${{ steps.docker.outputs.digest }}`
          - Платформа: `linux/amd64`
          - Артефакты: бинарник + контрольные суммы
          EOF

      - name: Публикация GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Релиз ${{ steps.vars.outputs.tag }}
          body_path: release-notes.md
          files: |
            release-artifacts/openmines-server-linux-x86_64
            release-artifacts/openmines-server-linux-x86_64.sha256
            release-artifacts/config.json
            release-artifacts/cells.json
