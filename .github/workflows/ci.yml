name: CI & Deploy

# Единый пайплайн (слияние CI + Build&Deploy ради скорости):
#   push → [check ‖ build] параллельно → deploy (needs обоих).
# Раньше было последовательно: CI → (лаг workflow_run) → build → deploy.
# Теперь проверки и сборка образа компилируются ОДНОВРЕМЕННО, лаг триггера убран.
# Ничего из проверок не удалено — fmt/clippy/test/bench на месте (job `check`).
on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "crates/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "configs/**"
      - "ops/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit ref to build & deploy"
        required: false
        default: "main"
      wipe:
        description: "ПОЛНЫЙ СНОС мира (down -v) — весь мир/БД стирается!"
        type: boolean
        required: false
        default: false

concurrency:
  # cancel-in-progress: false — НЕ отменять идущий деплой при новом пуше (Урок 4).
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/murasamadsp/openmines-server

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Пин 1.96 = локальный toolchain разработки (clippy nursery/pedantic
      # version-sensitive; на 1.89 фаерят другие линты). Бампать синхронно с
      # ops/Dockerfile при обновлении.
      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (toolchain pinned via `with` below)
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: install cargo-nextest
        run: cargo install --locked cargo-nextest

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: architecture guard
        run: scripts/arch-guard.sh

      - name: clippy (strict)
        run: CARGO_INCREMENTAL=0 cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery

      - name: test (nextest)
        run: CARGO_INCREMENTAL=0 cargo nextest run --all-targets --all-features

      - name: wire smoke
        run: scripts/dev-smoke.sh

      - name: bench (release, ~5s)
        run: cargo test --release -- bench_tick --ignored --nocapture

  build:
    name: Build & Push image
    # Параллельно с `check` (нет needs). На PR не собираем/не пушим образ.
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Resolve commit sha
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & push (linux/amd64 — VPS is x86_64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=openmines-server
          cache-to: type=gha,mode=max,scope=openmines-server

  deploy:
    name: Deploy to VPS
    # Гейт: деплой только если зелёные ОБЕ — проверки И сборка образа.
    needs: [check, build]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    # GITHUB_TOKEN deploy-джобы должен уметь читать приватный ghcr-пакет.
    # Без явного scope `docker login` проходит, а `pull` → "denied".
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE_SHA: ${{ needs.build.outputs.sha }}
          IMAGE: ${{ env.IMAGE }}
          WIPE: ${{ github.event.inputs.wipe }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Пин host-key (анти-MITM). Снять один раз:
          #   ssh-keyscan -t ed25519 <VPS_HOST>
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          envs: IMAGE_SHA,IMAGE,WIPE
          script: |
            set -euo pipefail
            # Инфра-пути — в секретах (репо публичный, не хардкодить).
            STACK="${{ secrets.VPS_STACK_DIR }}"
            VOL=openmines_server_data
            BACKUP_DIR="${{ secrets.VPS_BACKUP_DIR }}"

            echo "[deploy] login ghcr"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # === ЖЁСТКИЙ ГЕЙТ: бэкап world-volume ПЕРЕД деплоем (Урок 4) ===
            # Если бэкап падает — деплой НЕ продолжается. Мир невосстановим.
            # Исключаем *.bak — это серверные atomic-копии mmap-слоёв (~половина
            # объёма, ~3.3ГБ), дублируют живые слои. БД (.db/-wal/-shm) бэкапим
            # целиком: в -wal лежат закоммиченные, но не чекпойнтнутые транзакции.
            echo "[deploy] backing up world volume '$VOL' (excl *.bak)"
            mkdir -p "$BACKUP_DIR"
            TS=$(date +%F-%H%M%S)
            docker run --rm \
              -v "$VOL":/data:ro \
              -v "$BACKUP_DIR":/backup \
              alpine:3.20 \
              tar czf "/backup/world-$TS.tgz" --exclude='*.bak' -C /data .
            echo "[deploy] backup OK -> $BACKUP_DIR/world-$TS.tgz"
            # ротация: держим последние 10 бэкапов
            ls -1t "$BACKUP_DIR"/world-*.tgz | tail -n +11 | xargs -r rm -f

            cd "$STACK"
            # Самодостаточный prod-compose (image-based — VPS не собирает Rust).
            # ПЕРЕЗАПИСЫВАЕМ его на каждом деплое: единый источник правды.
            # Публичный 8090 временно держит сам сервер: proxy отключён, пока
            # его auth-ordering не доказан wire-smoke тестом.
            echo "[deploy] write compose.yml (server-only, 1337 admin)"
            cat > compose.yml <<COMPOSE
            services:
              server:
                image: ${IMAGE}:${IMAGE_SHA}
                init: true
                restart: unless-stopped
                ports:
                  - "8090:8090"
                environment:
                  - RUST_BACKTRACE=1
                  - M3R_DATA_DIR=/data
                  - M3R_GRANT_ADMIN=1337
                  - M3R_REGEN_WORLD=0
                  - M3R_USE_CTRL_C=false
                volumes:
                  - server_data:/data
            volumes:
              server_data:
                name: openmines_server_data
            COMPOSE

            echo "[deploy] pull image"
            docker compose pull

            # ПОЛНЫЙ СНОС только при ручном WIPE=true (workflow_dispatch). На обычных
            # пушах НЕ стираем — иначе каждый деплой убивал бы мир. Бэкап сделан выше.
            if [ "${WIPE:-}" = "true" ]; then
              echo "[deploy] WIPE=true → ПОЛНЫЙ СНОС мира (down -v + rm volume)"
              docker compose down -v --remove-orphans || true
              docker volume rm openmines_server_data 2>/dev/null || true
            fi

            echo "[deploy] up -d (--remove-orphans чистит старые сервисы)"
            docker compose up -d --remove-orphans

            # === Health-check: user-facing порт 8090 (service-agnostic) ===
            echo "[deploy] health-check: port 8090"
            ok=0
            for i in $(seq 1 10); do
              if timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8090' 2>/dev/null; then
                echo "[deploy] port 8090 OPEN (attempt $i)"; ok=1; break
              fi
              echo "[deploy] health $i/10 failed, retry in 5s"; sleep 5
            done
            [ "$ok" -eq 1 ] || { echo "[deploy] FAILED: 8090 not responding"; docker compose logs --tail 50; exit 1; }
            echo "[deploy] done ($IMAGE_SHA)"

      - name: Telegram notify (non-blocking)
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          STATUS: ${{ job.status }}
        run: |
          [ -z "${TG_TOKEN:-}" ] && { echo "no TG secrets, skip"; exit 0; }
          curl -sS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "text=OpenMines deploy: $STATUS (${{ github.sha }})" || true
