name: CI

# Строгие критерии качества из CLAUDE.md. deploy.yml запускается только
# после ЗЕЛЁНОГО прогона этого workflow (workflow_run).
on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "configs/**"
      - "ops/Dockerfile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Пин 1.94 = локальный toolchain разработки (clippy nursery/pedantic
      # version-sensitive; на 1.89 фаерят другие линты). Бампать синхронно с
      # ops/Dockerfile при обновлении.
      - name: Install Rust 1.94
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (toolchain pinned via `with` below)
        with:
          toolchain: "1.94"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (strict)
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery

      - name: test
        run: cargo test --all-targets --all-features

      - name: bench (release, ~5s)
        run: cargo test --release -- bench_tick --ignored --nocapture
