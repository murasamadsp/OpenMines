name: Build & Deploy

# GitOps (push-based, как murarental): зелёный CI -> сборка образа в GHA ->
# push в ghcr -> SSH на VPS -> бэкап world-volume -> docker compose up -d.
# VPS (Virtuozzo) НЕ умеет компилировать Rust, поэтому сборка только тут.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit ref to build & deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/murasamadsp/openmines-server

jobs:
  build-push:
    name: Build & Push image
    # только при ручном запуске ИЛИ успешном CI
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve commit sha
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & push (linux/amd64 — VPS is x86_64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=openmines-server
          cache-to: type=gha,mode=max,scope=openmines-server

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    # GITHUB_TOKEN deploy-джобы должен уметь читать приватный ghcr-пакет.
    # Без явного scope `docker login` проходит, а `pull` → "denied".
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE_SHA: ${{ needs.build-push.outputs.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Пин host-key (анти-MITM). Снять один раз:
          #   ssh-keyscan -t ed25519 <VPS_HOST>
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          envs: IMAGE_SHA
          script: |
            set -euo pipefail
            # Инфра-пути — в секретах (репо публичный, не хардкодить).
            STACK="${{ secrets.VPS_STACK_DIR }}"
            VOL=openmines_server_data
            BACKUP_DIR="${{ secrets.VPS_BACKUP_DIR }}"

            echo "[deploy] login ghcr"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # === ЖЁСТКИЙ ГЕЙТ: бэкап world-volume ПЕРЕД деплоем (Урок 4) ===
            # Если бэкап падает — деплой НЕ продолжается. Мир невосстановим.
            # Исключаем *.bak — это серверные atomic-копии mmap-слоёв (~половина
            # объёма, ~3.3ГБ), дублируют живые слои. БД (.db/-wal/-shm) бэкапим
            # целиком: в -wal лежат закоммиченные, но не чекпойнтнутые транзакции.
            echo "[deploy] backing up world volume '$VOL' (excl *.bak)"
            mkdir -p "$BACKUP_DIR"
            TS=$(date +%F-%H%M%S)
            docker run --rm \
              -v "$VOL":/data:ro \
              -v "$BACKUP_DIR":/backup \
              alpine:3.20 \
              tar czf "/backup/world-$TS.tgz" --exclude='*.bak' -C /data .
            echo "[deploy] backup OK -> $BACKUP_DIR/world-$TS.tgz"
            # ротация: держим последние 10 бэкапов
            ls -1t "$BACKUP_DIR"/world-*.tgz | tail -n +11 | xargs -r rm -f

            # === Деплой: ТОЛЬКО pull + up -d. НИКОГДА down (Урок 4). ===
            cd "$STACK"
            echo "[deploy] pull image"
            docker compose pull

            # ZERO-DOWNTIME: катим ТОЛЬКО бэкенд, прокси НЕ трогаем.
            # Прокси держит клиентский TCP живым; пересоздать его = оборвать всех
            # игроков (ровно то, что он должен предотвращать). Поэтому:
            #   1) --no-recreate: поднять недостающее (первый деплой), но НЕ
            #      пересоздавать уже живой прокси, даже если образ обновился;
            #   2) --force-recreate --no-deps openmines-server: катнуть ТОЛЬКО
            #      сервер. Прокси ловит обрыв к старому контейнеру и
            #      переподключается к новому (docker-DNS) — swallow ST/AU/PI +
            #      replay AU. Клиентский сокет не рвётся.
            # Обновить сам прокси (редко, при правке proxy.rs) — вручную:
            #   docker compose up -d --force-recreate openmines-proxy
            echo "[deploy] ensure stack up (no-recreate keeps proxy alive)"
            docker compose up -d --no-recreate
            echo "[deploy] roll backend only (proxy bridges the gap)"
            docker compose up -d --no-deps --force-recreate openmines-server

            # === Health-check, слой 1: БЭКЕНД реально поднялся ===
            # Прокси теперь переживает деплой и держит 8090 открытым НЕЗАВИСИМО
            # от сервера. Значит проверка «порт 8090 открыт» пройдёт даже если
            # новый сервер упал на старте (битый конфиг/миграция) — ложно-зелёный
            # деплой. Поэтому сперва убеждаемся, что контейнер сервера РАБОТАЕТ и
            # не в крэш-лупе: running + RestartCount==0, стабильно 3 проверки.
            echo "[deploy] health-check L1: backend container stable"
            cid=$(docker compose ps -q openmines-server)
            [ -n "$cid" ] || { echo "[deploy] FAILED: no openmines-server container"; docker compose ps; exit 1; }
            srv_ok=0; good=0
            for i in $(seq 1 20); do
              status=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo missing)
              restarts=$(docker inspect -f '{{.State.RestartCount}}' "$cid" 2>/dev/null || echo 0)
              if [ "$restarts" != 0 ] || [ "$status" = exited ] || [ "$status" = dead ]; then
                echo "[deploy] FAILED: backend crashed (status=$status restarts=$restarts)"
                docker compose logs --tail 80 openmines-server; exit 1
              fi
              if [ "$status" = running ]; then
                good=$((good+1)); echo "[deploy] backend running ($good/3 stable, attempt $i)"
                [ "$good" -ge 3 ] && { srv_ok=1; break; }
              else
                echo "[deploy] backend status=$status ($i/20), wait 3s"
              fi
              sleep 3
            done
            [ "$srv_ok" -eq 1 ] || { echo "[deploy] FAILED: backend not stable in time"; docker compose logs --tail 80 openmines-server; exit 1; }

            # === Health-check, слой 2: user-facing путь через прокси ===
            echo "[deploy] health-check L2: proxy accepts on 8090"
            ok=0
            for i in $(seq 1 10); do
              if timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8090' 2>/dev/null; then
                echo "[deploy] port 8090 OPEN (attempt $i)"; ok=1; break
              fi
              echo "[deploy] health $i/10 failed, retry in 5s"; sleep 5
            done
            [ "$ok" -eq 1 ] || { echo "[deploy] FAILED: 8090 not responding"; docker compose logs --tail 50; exit 1; }
            echo "[deploy] done ($IMAGE_SHA)"

      - name: Telegram notify (non-blocking)
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          STATUS: ${{ job.status }}
        run: |
          [ -z "${TG_TOKEN:-}" ] && { echo "no TG secrets, skip"; exit 0; }
          curl -sS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "text=OpenMines deploy: $STATUS (${{ github.sha }})" || true
