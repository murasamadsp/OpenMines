name: Build & Deploy

# GitOps (push-based, как murarental): зелёный CI -> сборка образа в GHA ->
# push в ghcr -> SSH на VPS -> бэкап world-volume -> docker compose up -d.
# VPS (Virtuozzo) НЕ умеет компилировать Rust, поэтому сборка только тут.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit ref to build & deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/murasamadsp/openmines-server

jobs:
  build-push:
    name: Build & Push image
    # только при ручном запуске ИЛИ успешном CI
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve commit sha
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (linux/amd64 — VPS is x86_64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=openmines-server
          cache-to: type=gha,mode=max,scope=openmines-server

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_SHA: ${{ needs.build-push.outputs.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Пин host-key (анти-MITM). Снять один раз:
          #   ssh-keyscan -t ed25519 <VPS_HOST>
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          envs: IMAGE_SHA
          script: |
            set -euo pipefail
            # Инфра-пути — в секретах (репо публичный, не хардкодить).
            STACK="${{ secrets.VPS_STACK_DIR }}"
            VOL=openmines_server_data
            BACKUP_DIR="${{ secrets.VPS_BACKUP_DIR }}"

            echo "[deploy] login ghcr"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # === ЖЁСТКИЙ ГЕЙТ: бэкап world-volume ПЕРЕД деплоем (Урок 4) ===
            # Если бэкап падает — деплой НЕ продолжается. Мир невосстановим.
            echo "[deploy] backing up world volume '$VOL'"
            mkdir -p "$BACKUP_DIR"
            TS=$(date +%F-%H%M%S)
            docker run --rm \
              -v "$VOL":/data:ro \
              -v "$BACKUP_DIR":/backup \
              alpine:3.20 \
              tar czf "/backup/world-$TS.tgz" -C /data .
            echo "[deploy] backup OK -> $BACKUP_DIR/world-$TS.tgz"
            # ротация: держим последние 10 бэкапов
            ls -1t "$BACKUP_DIR"/world-*.tgz | tail -n +11 | xargs -r rm -f

            # === Деплой: ТОЛЬКО pull + up -d. НИКОГДА down (Урок 4). ===
            cd "$STACK"
            echo "[deploy] pull image"
            docker compose pull
            echo "[deploy] up -d (force-recreate сохраняет named volume)"
            docker compose up -d

            # === Health-check: TCP-хендшейк на 8090 ===
            echo "[deploy] health-check 8090"
            ok=0
            for i in $(seq 1 10); do
              if timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8090' 2>/dev/null; then
                echo "[deploy] port 8090 OPEN (attempt $i)"; ok=1; break
              fi
              echo "[deploy] health $i/10 failed, retry in 5s"; sleep 5
            done
            [ "$ok" -eq 1 ] || { echo "[deploy] FAILED: 8090 not responding"; docker compose logs --tail 50; exit 1; }
            echo "[deploy] done ($IMAGE_SHA)"

      - name: Telegram notify (non-blocking)
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          STATUS: ${{ job.status }}
        run: |
          [ -z "${TG_TOKEN:-}" ] && { echo "no TG secrets, skip"; exit 0; }
          curl -sS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "text=OpenMines deploy: $STATUS (${{ github.sha }})" || true
