name: development

services:
  server:
    # Docker: tini как PID 1 (сигналы/zombie) — не часть игрового референса, только рантайм контейнера.
    init: true
    build:
      context: ..
      dockerfile: ops/Dockerfile.vps
    image: openmines-server-dev:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "8091:8091"
    volumes:
      - development_server_data:/data
    labels:
      - "com.example.group=games"
      - "com.example.environment=development"
    environment:
      # Паники в логах Docker: строка + стек (см. server/logging.rs `log_panic_to_stderr`).
      RUST_BACKTRACE: "1"
      # Жёстко выйти после паники (exit 101), чтобы `restart` и метрики явно зафиксировали сбой.
      # Раскомментируй на время расследования «немых» падений воркеров Tokio.
      # M3R_ABORT_ON_PANIC: "1"
      # Не ждать SIGINT от `ctrl_c()` в контейнере (см. server/main.rs shutdown task).
      M3R_USE_CTRL_C: "0"
      # Временно усилить копание (множитель урона по НЕ-кристаллам).
      M3R_DIG_MULT: "6"
      # Включить точечные логи копания сыпучки (см. dig_build.rs); выключать, когда отладим.
      M3R_TRACE_DIG: "1"
      # Роли: `players.role` — 0 игрок, 1 модератор, 2 админ (ручной SQL: UPDATE … SET role=2).
      M3R_GRANT_ADMIN: Murasama,Admin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  development_server_data:
    # Имя оставлено для совместимости с уже созданным томом на VPS (данные не теряются).
    name: mines3_server_data

networks:
  default:
    name: infra-net
    external: true
