name: development

services:
  server:
    build:
      context: ..
      dockerfile: ops/Dockerfile
      # Virtuozzo 7 (ядро *.vz7.*): новые контейнеры с изолированным netns падают в runc
      # («can't get final child's PID from pipe: EOF»). Сборка с host-сетью — рабочий обход.
      network: host
    image: openmines-server-dev:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
      # Map viewer / admin HTTP API (`mapviewer_http_port` в config.json, по умолчанию 8091).
      - "8091:8091"
    volumes:
      - development_server_data:/data
    labels:
      - "com.example.group=games"
      - "com.example.environment=development"
    environment:
      RUST_LOG: openmines_server=info
      # Временно усилить копание (множитель урона по НЕ-кристаллам).
      M3R_DIG_MULT: "6"
      # Включить точечные логи копания сыпучки (см. dig_build.rs); выключать, когда отладим.
      M3R_TRACE_DIG: "1"
      # Роли: `players.role` — 0 игрок, 1 модератор, 2 админ (ручной SQL: UPDATE … SET role=2).
      M3R_GRANT_ADMIN: Murasama
    security_opt:
      - no-new-privileges:true
    networks:
      - net_core
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    logging:
      options:
        max-size: 20m
        max-file: "3"

volumes:
  development_server_data:
    # Имя оставлено для совместимости с уже созданным томом на VPS (данные не теряются).
    name: mines3_server_data

networks:
  net_core:
    name: infra-net
    external: true
