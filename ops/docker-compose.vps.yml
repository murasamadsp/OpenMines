name: openmines

services:
  server:
    image: rust:1.89-bookworm
    command: cargo run --release
    ports:
      - "8090:8090"
      - "8091:8091"
    volumes:
      - openmines_server_data:/data
      - ../:/build
      # Кеш cargo (ускоряет пересборку при итерациях; volume'ы уже есть на VPS).
      - openmines-cargo-registry:/usr/local/cargo/registry
      - openmines-cargo-git:/usr/local/cargo/git
    working_dir: /build
    environment:
      RUST_BACKTRACE: "1"
      M3R_DATA_DIR: "/data"
      # REGEN отключён: сохраняем существующий мир/игроков на volume при
      # деплое фикса (force-recreate контейнера НЕ трогает named volume).
      # Было "1" для repro фриза (чистый мир); для прод-деплоя — "0".
      M3R_REGEN_WORLD: "0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openmines_server_data:
    name: openmines_server_data
  openmines-cargo-registry:
    name: openmines-cargo-registry
    external: true
  openmines-cargo-git:
    name: openmines-cargo-git
    external: true

networks:
  default:
    name: infra-net
    external: true
