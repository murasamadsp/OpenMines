services:
  openmines-server:
    init: true # см. ops/docker-compose.vps.yml — стабильный PID 1 в контейнере
    build:
      context: ..
      dockerfile: ops/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - openmines_data:/data

volumes:
  openmines_data:
